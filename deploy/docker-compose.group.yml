# KafGraph Multi-Agent Workshop Environment
# Simulates a team of agents sharing a distributed brain.
# Usage: docker compose -f deploy/docker-compose.group.yml up -d

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafgraph-agent-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      KAFGRAPH_KAFKA_BROKERS: kafka:9092
      KAFGRAPH_S3_ENDPOINT: minio:9000
      KAFGRAPH_S3_ACCESS_KEY: minioadmin
      KAFGRAPH_S3_SECRET_KEY: minioadmin
      KAFGRAPH_LOG_LEVEL: debug
    depends_on:
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy

  kafgraph-agent-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      KAFGRAPH_KAFKA_BROKERS: kafka:9092
      KAFGRAPH_S3_ENDPOINT: minio:9000
      KAFGRAPH_S3_ACCESS_KEY: minioadmin
      KAFGRAPH_S3_SECRET_KEY: minioadmin
      KAFGRAPH_LOG_LEVEL: debug
    depends_on:
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy

  kafgraph-agent-3:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      KAFGRAPH_KAFKA_BROKERS: kafka:9092
      KAFGRAPH_S3_ENDPOINT: minio:9000
      KAFGRAPH_S3_ACCESS_KEY: minioadmin
      KAFGRAPH_S3_SECRET_KEY: minioadmin
      KAFGRAPH_LOG_LEVEL: debug
    depends_on:
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
