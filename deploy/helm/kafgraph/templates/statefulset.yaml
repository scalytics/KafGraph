apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kafgraph.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafgraph.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "kafgraph.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kafgraph.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kafgraph.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kafgraph.serviceAccountName" . }}
      # Disable legacy K8s service env injection — it creates KAFGRAPH_PORT=tcp://…
      # which viper tries to parse as the config `port` int.
      enableServiceLinks: false
      containers:
        - name: kafgraph
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 7474 }
            - { name: bolt, containerPort: 7687 }
            - { name: metrics, containerPort: 9090 }
          env:
            - name: KAFGRAPH_PORT
              value: "7474"
            - name: KAFGRAPH_BOLT_PORT
              value: "7687"
            - name: KAFGRAPH_KAFKA_BROKERS
              value: {{ .Values.config.kafkaBrokers | quote }}
            - name: KAFGRAPH_S3_ENDPOINT
              value: {{ .Values.config.s3.endpoint | quote }}
            - name: KAFGRAPH_S3_BUCKET
              value: {{ .Values.config.s3.bucket | quote }}
            - name: KAFGRAPH_S3_ACCESS_KEY
              value: {{ .Values.config.s3.accessKey | quote }}
            - name: KAFGRAPH_S3_SECRET_KEY
              value: {{ .Values.config.s3.secretKey | quote }}
            - name: KAFGRAPH_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafgraph
      {{- if not .Values.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
        {{- with .Values.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kafgraph.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafgraph.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - { name: http, port: {{ .Values.service.httpPort }}, targetPort: 7474 }
    - { name: bolt, port: {{ .Values.service.boltPort }}, targetPort: 7687 }
    - { name: metrics, port: {{ .Values.service.metricsPort }}, targetPort: 9090 }
  selector:
    {{- include "kafgraph.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kafgraph.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafgraph.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - { name: http, port: 7474 }
    - { name: bolt, port: 7687 }
  selector:
    {{- include "kafgraph.selectorLabels" . | nindent 4 }}
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kafgraph.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafgraph.labels" . | nindent 4 }}
{{- end }}
